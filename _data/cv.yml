cv:
  name: Ashuthosh M. R.
  label: Senior Hardware Design Engineer
  email: ashuthoshmr25@gmail.com
  location: Bengaluru, India
  image: ""
  summary: >
    Hardware design engineer with expertise in computer architecture, performance
    modeling, workload characterization, and hardware/software co-design for
    compute-intensive workloads. Experienced in developing analytical
    power/performance models, profiling frameworks, and microarchitectural analyses
    for RISC-V-based many-core systems, low-/mixed-precision AI kernels, and FPGA
    accelerators.

  social_networks:
    - network: GitHub
      username: ashuthosh-mr
    - network: LinkedIn
      username: ashuthosh-mr

  sections:
    Experience:
      - company: Calligo Technologies
        position: Senior Hardware Design Engineer
        location: Bengaluru, India
        start_date: 2025-01-01
        highlights:
          - Contributing to the design of a high-performance RISC-V based multicore processor with POSIT (low-/mixed-precision) arithmetic support, targeting AI/ML acceleration.
          - Performing workload-driven microarchitectural analysis to improve performance, power efficiency, and computational throughput.
          - Collaborating with verification and physical design teams to assess PPA trade-offs and guide architectural decisions.

      - company: Centre for Heterogeneous and Intelligent Processing Systems (CHIPS), PES University
        position: Research Assistant
        location: Bengaluru, India
        start_date: 2020-09-01
        end_date: 2025-01-01
        highlights:
          - Designed FPGA-based accelerators for sparse-dense matrix multiplication, enabling high-throughput AI/ML kernel execution under resource constraints.
          - Developed an analytical performance model for RISC-V many-core architectures, enabling design-space exploration for graph-algorithm workloads.
          - Built a trace-driven profiler for RISC-V, identifying instruction-level extensions and application-specific accelerators to improve ML workload performance and efficiency.
          - Collaborated with the Semiconductor Research Corporation (SRC) on a funded project on Customized and Domain Optimized RISC-V based FPGA Overlays.
          - Conducted RISC-V-on-FPGA lab sessions and mentored B.Tech students through processor-design and hardware-acceleration capstone projects.

      - company: Computer Architecture and High-Performance Lab, Amrita Vishwa Vidyapeetham
        position: Research Assistant (Intern)
        location: Remote
        start_date: 2020-01-01
        end_date: 2020-05-01
        highlights:
          - Investigated robust GF(2^m) NB-LDPC decoders on FPGA, benchmarking throughput, power, and area against GPU implementations as part of the ECHO Indo-Portugal project.

